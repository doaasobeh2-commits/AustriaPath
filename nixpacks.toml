# Nixpacks fallback (only if builder = "NIXPACKS").
# Railway's default builder is Railpack — use railpack.json for API deploys.
#
# Do not cache node_modules/.cache: npm ci must remove it; a cached mount causes EBUSY.

[variables]
NPM_CONFIG_CACHE = "/tmp/.npm"

[phases.install]
cmds = ["npm ci --cache /tmp/.npm --no-audit --fund=false"]
cacheDirectories = ["/tmp/.npm"]

[phases.build]
cmds = []
cacheDirectories = []
