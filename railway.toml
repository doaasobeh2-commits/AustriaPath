# Railway — full-stack (Vite SPA + Express API on one service).
# Build: npm run build (via railpack.json) → dist/
# Start: migrations + node server/src/index.js (serves / + /v1)
#
# Builder: RAILPACK (Railway default). Config: railpack.json
# See deploy/RAILWAY-API.md

[build]
builder = "RAILPACK"

[deploy]
startCommand = "npm run server:migrate && npm run server:start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
